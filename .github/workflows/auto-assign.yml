name: Auto Assign PR Author

on:
  pull_request:
    types:
      - opened

jobs:
  assign:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - uses: wow-actions/auto-assign@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          assignees: ${{ github.actor }}
          addReviewers: false